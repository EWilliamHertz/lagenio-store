<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagenio Products Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: fadeIn 0.6s ease-in;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .product-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.6s ease-out;
        }

        .product-btn {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            color: #667eea;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .product-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .product-btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .gallery-section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .gallery-section.active {
            display: block;
        }

        .product-title {
            color: white;
            font-size: 2.2em;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item::after {
            content: '🔍';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            opacity: 0;
            transition: opacity 0.3s ease;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 90vw;
            max-height: 90vh;
            animation: slideUp 0.4s ease;
        }

        .modal-image {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255,255,255,0.3);
        }

        .modal-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3em;
            color: white;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .modal-close:hover {
            transform: scale(1.2) rotate(90deg);
        }

        .modal-info {
            color: white;
            margin-top: 15px;
            font-size: 0.95em;
            text-align: center;
            max-width: 90vw;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5em;
            color: white;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .modal-nav:hover {
            transform: translateY(-50%) scale(1.2);
        }

        .modal-prev {
            left: 20px;
        }

        .modal-next {
            right: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
            }

            .modal-nav {
                font-size: 2em;
                padding: 15px;
            }

            .modal-close {
                top: 15px;
                right: 20px;
                font-size: 2em;
            }

            .product-tabs {
                gap: 10px;
            }

            .product-btn {
                padding: 12px 20px;
                font-size: 0.95em;
            }
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 Lagenio Rugged Smartphones</h1>
            <p>Explore our premium collection of durable devices</p>
        </header>

        <div class="product-tabs">
            <button class="product-btn active" data-product="Rhino 1 Pro">Rhino 1 Pro</button>
            <button class="product-btn" data-product="Eagle Pro">Eagle Pro</button>
            <button class="product-btn" data-product="Panther 2 Pro">Panther 2 Pro</button>
        </div>

        <!-- Rhino 1 Pro Gallery -->
        <div class="gallery-section active" data-product="Rhino 1 Pro">
            <h2 class="product-title">Rhino 1 Pro</h2>
            <div class="gallery-grid" id="gallery-rhino"></div>
        </div>

        <!-- Eagle Pro Gallery -->
        <div class="gallery-section" data-product="Eagle Pro">
            <h2 class="product-title">Eagle Pro</h2>
            <div class="gallery-grid" id="gallery-eagle"></div>
        </div>

        <!-- Panther 2 Pro Gallery -->
        <div class="gallery-section" data-product="Panther 2 Pro">
            <h2 class="product-title">Panther 2 Pro</h2>
            <div class="gallery-grid" id="gallery-panther"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="imageModal">
        <span class="modal-close" id="modalClose">&times;</span>
        <span class="modal-nav modal-prev" id="modalPrev">&#10094;</span>
        <div class="modal-content">
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-info" id="modalInfo"></div>
        </div>
        <span class="modal-nav modal-next" id="modalNext">&#10095;</span>
    </div>

    <script>
        const products = {
            'Rhino 1 Pro': [],
            'Eagle Pro': [],
            'Panther 2 Pro': []
        };

        let currentProduct = 'Rhino 1 Pro';
        let currentImageIndex = 0;
        let allImages = [];

        // Generate image paths for each product
        function initializeProducts() {
            // Rhino 1 Pro
            for (let i = 1; i <= 6; i++) {
                products['Rhino 1 Pro'].push({
                    src: `Rhino 1 Pro/lagenio_${i}.${i === 3 || i === 5 || i === 7 ? 'png' : 'jpg'}`,
                    name: `Rhino 1 Pro - Lagenio Image ${i}`
                });
            }
            for (let i = 1; i <= 20; i++) {
                products['Rhino 1 Pro'].push({
                    src: `Rhino 1 Pro/alibaba_${i}.${[5, 7, 11].includes(i) ? 'png' : 'jpg'}`,
                    name: `Rhino 1 Pro - Alibaba Image ${i}`
                });
            }

            // Eagle Pro
            for (let i = 1; i <= 9; i++) {
                products['Eagle Pro'].push({
                    src: `Eagle Pro/lagenio_${i}.${[1, 4, 5, 6, 8, 9].includes(i) ? 'png' : 'jpg'}`,
                    name: `Eagle Pro - Image ${i}`
                });
            }

            // Panther 2 Pro
            for (let i = 1; i <= 7; i++) {
                products['Panther 2 Pro'].push({
                    src: `Panther 2 Pro/lagenio_${i}.${[1, 4, 6].includes(i) ? 'png' : 'jpg'}`,
                    name: `Panther 2 Pro - Image ${i}`
                });
            }
        }

        function renderGallery(productName) {
            const galleryId = {
                'Rhino 1 Pro': 'gallery-rhino',
                'Eagle Pro': 'gallery-eagle',
                'Panther 2 Pro': 'gallery-panther'
            }[productName];

            const gallery = document.getElementById(galleryId);
            gallery.innerHTML = '';

            products[productName].forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `<img src="${image.src}" alt="${image.name}" loading="lazy">`;
                item.addEventListener('click', () => openModal(productName, index));
                gallery.appendChild(item);
            });
        }

        function openModal(productName, index) {
            currentProduct = productName;
            currentImageIndex = index;
            allImages = products[productName];
            updateModalImage();
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateModalImage() {
            const image = allImages[currentImageIndex];
            const modalImage = document.getElementById('modalImage');
            const modalInfo = document.getElementById('modalInfo');
            
            modalImage.src = image.src;
            modalInfo.textContent = `${image.name} (${currentImageIndex + 1} of ${allImages.length})`;
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % allImages.length;
            updateModalImage();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + allImages.length) % allImages.length;
            updateModalImage();
        }

        // Event Listeners
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalNext').addEventListener('click', nextImage);
        document.getElementById('modalPrev').addEventListener('click', prevImage);

        // Close modal when clicking outside the image
        document.getElementById('imageModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('imageModal')) {
                closeModal();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('imageModal').classList.contains('active')) return;
            
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeModal();
        });

        // Product tab switching
        document.querySelectorAll('.product-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.gallery-section').forEach(s => s.classList.remove('active'));
                
                e.target.classList.add('active');
                const product = e.target.dataset.product;
                document.querySelector(`[data-product="${product}"]`).classList.add('active');
            });
        });

        // Initialize
        initializeProducts();
        renderGallery('Rhino 1 Pro');
        renderGallery('Eagle Pro');
        renderGallery('Panther 2 Pro');
    </script>
</body>
</html>
